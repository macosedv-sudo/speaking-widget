<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Speaking Practice Widget</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f7f7f7;
    }
    h2 {
        color: #333;
    }
    #controls {
        margin-top: 15px;
    }
    button {
        padding: 10px 20px;
        margin-right: 10px;
        font-size: 16px;
        cursor: pointer;
    }
    #timer {
        font-size: 22px;
        font-weight: bold;
        margin-top: 10px;
        color: #444;
    }
    #transcript {
        margin-top: 20px;
        padding: 10px;
        background: white;
        border-radius: 5px;
        min-height: 80px;
    }
    #feedback {
        margin-top: 20px;
        padding: 10px;
        background: #e8f4ff;
        border-left: 4px solid #0077cc;
        border-radius: 5px;
        min-height: 80px;
    }
</style>
</head>

<body>

<h2>Speaking Practice</h2>

<p><strong>Instructions:</strong> Click Start, speak your answer, then click Stop when you finish. Maximum time: 1:30.</p>

<div id="controls">
    <button id="startBtn">Start</button>
    <button id="stopBtn" disabled>Stop</button>
</div>

<div id="timer">00:00</div>

<h3>Your Transcript:</h3>
<div id="transcript"></div>

<h3>Feedback:</h3>
<div id="feedback"></div>

<script>
let mediaRecorder;
let audioChunks = [];
let timerInterval;
let secondsElapsed = 0;
const MAX_TIME = 90; // 1:30

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const timerDisplay = document.getElementById("timer");
const transcriptDiv = document.getElementById("transcript");
const feedbackDiv = document.getElementById("feedback");

function updateTimer() {
    secondsElapsed++;
    const minutes = String(Math.floor(secondsElapsed / 60)).padStart(2, "0");
    const seconds = String(secondsElapsed % 60).padStart(2, "0");
    timerDisplay.textContent = `${minutes}:${seconds}`;

    if (secondsElapsed >= MAX_TIME) {
        stopRecording();
    }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }
    clearInterval(timerInterval);
    timerInterval = null;
    startBtn.disabled = false;
    stopBtn.disabled = true;
}

startBtn.addEventListener("click", async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);

    audioChunks = [];
    secondsElapsed = 0;
    timerDisplay.textContent = "00:00";

    mediaRecorder.ondataavailable = event => {
        audioChunks.push(event.data);
    };

    mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: "audio/mp3" });
        const reader = new FileReader();

        reader.onloadend = async () => {
            const base64Audio = reader.result.split(",")[1];

            transcriptDiv.textContent = "Processing speech...";
            feedbackDiv.textContent = "Generating feedback...";

            const response = await fetch(
                "https://api.openai.com/v1/chat/completions",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer YOUR_API_KEY"
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            {
                                role: "user",
                                content: [
                                    {
                                        type: "input_audio",
                                        input_audio: {
                                            data: base64Audio,
                                            format: "mp3"
                                        }
                                    },
                                    {
                                        type: "text",
                                        text: "Transcribe the audio and give B1-level feedback."
                                    }
                                ]
                            }
                        ]
                    })
                }
            );

            const data = await response.json();
            const result = data.choices[0].message.content;

            const [transcription, feedback] = result.split("Feedback:");

            transcriptDiv.textContent = transcription.trim();
            feedbackDiv.textContent = feedback.trim();
        };

        reader.readAsDataURL(audioBlob);
    };

    mediaRecorder.start();
    timerInterval = setInterval(updateTimer, 1000);

    startBtn.disabled = true;
    stopBtn.disabled = false;
});

stopBtn.addEventListener("click", () => {
    stopRecording(); // ⭐ DETIENE GRABACIÓN + CONTADOR
});
</script>

</body>
</html>
