<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Speaking Feedback (Free)</title>
<script src="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@latest/dist/web-llm.min.js"></script>

<style>
  body { font-family: Arial; max-width: 750px; margin: 20px auto; }
  .block { border: 1px solid #ccc; padding: 15px; margin-bottom: 25px; border-radius: 8px; }
  button { padding: 8px 14px; margin: 5px 0; cursor: pointer; }
  .timer { font-weight: bold; color: #b22222; }
  .feedback { background: #f7f7f7; padding: 10px; margin-top: 10px; border-left: 4px solid #0077cc; }
</style>
</head>

<body>
<h1>B1 Speaking Practice – AI Feedback</h1>
<p>Record your answer. The AI will analyse your speaking and give feedback.</p>

<div id="q1" class="block">
  <h2>Question 1</h2>
  <p><b>What’s your favourite Asturian city to live in? Why?</b></p>
  <button onclick="startRecording(1)">Start recording</button>
  <button onclick="stopRecording(1)" id="stop1" disabled>Stop</button>
  <p class="timer" id="timer1">Time: 1:30</p>
  <p id="transcript1"></p>
  <button onclick="analyse(1)">Get AI feedback</button>
  <div class="feedback" id="feedback1"></div>
</div>

<div id="q2" class="block">
  <h2>Question 2</h2>
  <p><b>How often do you watch series, and which ones are your favourite?</b></p>
  <button onclick="startRecording(2)">Start recording</button>
  <button onclick="stopRecording(2)" id="stop2" disabled>Stop</button>
  <p class="timer" id="timer2">Time: 1:30</p>
  <p id="transcript2"></p>
  <button onclick="analyse(2)">Get AI feedback</button>
  <div class="feedback" id="feedback2"></div>
</div>

<script>
let recognition;
let currentQ = null;
let timers = {};
let timeLeft = {};

if ("webkitSpeechRecognition" in window) {
  recognition = new webkitSpeechRecognition();
  recognition.lang = "en-GB";
  recognition.continuous = true;
  recognition.interimResults = false;
} else {
  alert("Your browser does not support speech recognition.");
}

function startRecording(q) {
  currentQ = q;
  document.getElementById("stop" + q).disabled = false;

  timeLeft[q] = 90;
  updateTimer(q);
  timers[q] = setInterval(() => {
    timeLeft[q]--;
    updateTimer(q);
    if (timeLeft[q] <= 0) stopRecording(q);
  }, 1000);

  recognition.start();
  document.getElementById("transcript" + q).innerHTML = "<i>Listening...</i>";
}

recognition.onresult = function(event) {
  const text = event.results[event.results.length - 1][0].transcript;
  document.getElementById("transcript" + currentQ).innerHTML = "<b>Your speech:</b> " + text;
};

function stopRecording(q) {
  recognition.stop();
  clearInterval(timers[q]);
  document.getElementById("stop" + q).disabled = true;
}

function updateTimer(q) {
  const m = Math.floor(timeLeft[q] / 60);
  const s = timeLeft[q] % 60;
  document.getElementById("timer" + q).textContent = `Time: ${m}:${s < 10 ? "0" + s : s}`;
}

// ----------------------
// AI FEEDBACK (WebLLM)
// ----------------------
const engine = new webllm.MLCEngine();
engine.reload("Llama-3.1-8B-Instruct-q4f32_1-MLC");

async function analyse(q) {
  const text = document.getElementById("transcript" + q).innerText.replace("Your speech:", "").trim();
  if (!text) {
    alert("No speech detected.");
    return;
  }

  const prompt = `
You are an English teacher. Analyse this B1 student's spoken answer.
Give feedback in 4 categories:

1. Grammar
2. Vocabulary
3. Fluency
4. Pronunciation (based on typical errors)

Student answer: "${text}"

Give clear, simple feedback.
`;

  const reply = await engine.chat.completions.create({
    messages: [{ role: "user", content: prompt }],
    temperature: 0.4
  });

  document.getElementById("feedback" + q).innerHTML = reply.choices[0].message.content;
}
</script>

</body>
</html>
